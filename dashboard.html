<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Album Feed Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { font-family: 'DM Sans', sans-serif; background: #060606; color: #f0f0f0; }
    .btn-a { background: linear-gradient(135deg, #e8572a, #ff7e47); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-a:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,87,42,0.3); }
    .btn-g { background: transparent; color: #aaa; border: 1px solid #2a2a2a; border-radius: 10px; padding: 8px 16px; cursor: pointer; transition: all .2s; }
    .btn-g:hover { color: #f0f0f0; border-color: #555; }
    .album-card { background: #111; border: 1px solid #2a2a2a; border-radius: 16px; overflow: hidden; transition: transform .2s, border-color .2s; }
    .album-card:hover { transform: translateY(-4px); border-color: #e8572a; }
    .empty-state { border: 2px dashed #2a2a2a; border-radius: 16px; padding: 40px; text-align: center; color: #666; }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-[#1a1a1a] bg-[#0a0a0a] sticky top-0 z-10">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-xl">📸</span>
            <h1 class="text-lg font-bold">Dashboard Saya</h1>
        </div>
        <button onclick="logout()" class="btn-g flex items-center gap-2">
            <i class="fas fa-right-from-bracket text-xs"></i> Logout
        </button>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <!-- Info Akun -->
    <div class="bg-[#111] border border-[#2a2a2a] rounded-2xl p-5 mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Akun Aktif</p>
            <h2 id="userEmail" class="text-xl font-bold text-white">Loading...</h2>
            <p class="text-sm text-gray-400 mt-1"><i class="fab fa-whatsapp text-green-500 mr-1"></i><span id="userWa">-</span></p>
        </div>
        <button onclick="createNewAlbum()" class="btn-a flex items-center gap-2">
            <i class="fas fa-plus"></i> Buat Album Baru
        </button>
    </div>

    <!-- Daftar Album -->
    <div>
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Album Saya</h3>
        <div id="albumList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Album cards akan dirender di sini -->
            <div class="col-span-full text-center text-gray-500 py-10">
                <i class="fas fa-spinner fa-spin text-2xl mb-3"></i>
                <p>Memuat album...</p>
            </div>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBXLvuPUsI6jz5wmKRzOmR-R1NQcVbkfu0",
      authDomain: "feed-editor-93db1.firebaseapp.com",
      projectId: "feed-editor-93db1",
      storageBucket: "feed-editor-93db1.firebasestorage.app",
      messagingSenderId: "249842615247",
      appId: "1:249842615247:web:6ef4a9713bdccc5f5508ba"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    // Cek Status Login
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            loadUserData(user.uid);
            loadAlbums(user.uid);
        } else {
            window.location.href = "login.html"; // Belum login, balik ke halaman login
        }
    });

    // Ambil data info user
    function loadUserData(uid) {
        db.collection('users').doc(uid).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('userEmail').innerText = data.email;
                document.getElementById('userWa').innerText = data.whatsapp || 'Belum diisi';
                
                // Cek jika akun disuspend
                if(data.status === 'suspended') {
                    alert('Akun Anda dinonaktifkan oleh Admin.');
                    logout();
                }
            }
        });
    }

    // Ambil daftar album milik user
    function loadAlbums(uid) {
        db.collection('albums').where('userId', '==', uid).onSnapshot((snapshot) => {
            const listContainer = document.getElementById('albumList');
            
            if (snapshot.empty) {
                listContainer.innerHTML = `
                    <div class="col-span-full empty-state">
                        <i class="fas fa-images text-4xl mb-4"></i>
                        <h4 class="text-lg font-bold text-gray-300 mb-2">Belum ada Album</h4>
                        <p class="mb-4">Mulai buat Album Feed pertama Anda sekarang!</p>
                        <button onclick="createNewAlbum()" class="btn-a">+ Buat Album Baru</button>
                    </div>
                `;
                return;
            }

            let html = '';
            snapshot.forEach((doc) => {
                const album = doc.data();
                const albumId = doc.id;
                const cardCount = album.cards ? album.cards.length : 0;
                const ogImg = album.ogImage || (album.cards && album.cards[0] && album.cards[0].images[0] ? album.cards[0].images[0].url : 'https://via.placeholder.com/400x225/111/333?text=No+Image');
                
                html += `
                    <div class="album-card flex flex-col">
                        <div class="aspect-video bg-[#0a0a0a] overflow-hidden">
                            <img src="${ogImg}" alt="${album.name}" class="w-full h-full object-cover opacity-90">
                        </div>
                        <div class="p-4 flex-1 flex flex-col">
                            <h4 class="font-bold text-white truncate mb-1">${album.name}</h4>
                            <p class="text-xs text-gray-500 mb-3"><i class="fas fa-layer-group mr-1"></i> ${cardCount} Feed Card</p>
                            <div class="flex gap-2 mt-auto">
                                <button onclick="editAlbum('${albumId}')" class="btn-a flex-1 text-sm" style="padding:8px 12px;">
                                    <i class="fas fa-pen mr-1"></i> Edit
                                </button>
                                <button onclick="viewAlbum('${albumId}')" class="btn-g text-sm" style="padding:8px 12px;" title="Lihat sebagai Pemirsa">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="deleteAlbum('${albumId}', '${album.name}')" class="btn-g text-sm text-red-500" style="padding:8px 12px;" title="Hapus Album">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
        });
    }

    // Buat Album Baru
    function createNewAlbum() {
        const name = prompt("Masukkan nama album baru:", "Album Feed Saya");
        if (!name) return;

        db.collection('albums').add({
            name: name,
            userId: currentUser.uid,
            status: 'active',
            bgColor: '#1a1a2e',
            ogImage: '',
            gaId: '',
            gaName: '',
            slug: name.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-').slice(0,60) || 'album-' + Date.now(),
            monetagEnabled: false, // Ambil dari user nanti di view
            cards: [], // Array kosong untuk ditempati Feed Card
            banners: [], // Array kosong untuk Sliding Banner
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then((docRef) => {
            // Langsung arahkan ke editor dengan ID album ini
            window.location.href = `index.html?albumId=${docRef.id}`;
        }).catch((error) => {
            alert("Gagal membuat album: " + error.message);
        });
    }

    // Edit Album
    function editAlbum(albumId) {
        window.location.href = `index.html?albumId=${albumId}`;
    }

    // Lihat Album (Preview Publik)
    function viewAlbum(albumId) {
        window.open(`view.html?albumId=${albumId}`, '_blank');
    }

    // Hapus Album
    function deleteAlbum(albumId, albumName) {
        if (confirm(`Yakin ingin menghapus album "${albumName}"? Semua Feed Card di dalamnya akan hilang.`)) {
            db.collection('albums').doc(albumId).delete().then(() => {
                // akan otomatis terhapus dari UI karena onSnapshot
            }).catch((error) => {
                alert("Gagal menghapus: " + error.message);
            });
        }
    }

    // Logout
    function logout() {
        auth.signOut().then(() => {
            window.location.href = "login.html";
        });
    }
</script>
</body>
</html>
